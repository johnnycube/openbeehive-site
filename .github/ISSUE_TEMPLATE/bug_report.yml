name: 🐛 Bug report
description: Report a problem with the openbeehive.org website.
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What's broken, and what did you expect instead?
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page / URL
      placeholder: "e.g. https://openbeehive.org/privacy"
  - type: textarea
    id: environment
    attributes:
      label: Browser & device
      placeholder: "e.g. Safari 17 on iPhone"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
